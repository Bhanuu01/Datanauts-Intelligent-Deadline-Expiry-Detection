apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: paperless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-ngx
  template:
    metadata:
      labels:
        app: paperless-ngx
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          ports:
            - containerPort: 8000
          env:
            - name: PAPERLESS_REDIS
              value: redis://redis:6379
            - name: PAPERLESS_DBHOST
              value: postgres
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_DBUSER
              value: paperless
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: POSTGRES_PASSWORD
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_SECRET_KEY
            - name: PAPERLESS_ADMIN_USER
              value: admin
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_ADMIN_PASSWORD
            - name: PAPERLESS_TIME_ZONE
              value: America/New_York
            - name: PAPERLESS_OCR_LANGUAGE
              value: eng
            - name: PAPERLESS_POST_CONSUME_SCRIPT
              value: /usr/src/paperless/scripts/deadline_post_consume.py
            - name: PAPERLESS_INTERNAL_URL
              value: http://127.0.0.1:8000
            - name: DEADLINE_INFERENCE_URL
              value: http://deadline-onnx-serving.ml.svc.cluster.local:8004/predict
            - name: ONLINE_FEATURES_FEEDBACK_URL
              value: http://online-features.ml.svc.cluster.local:8000/feedback
            - name: DEADLINE_RESULTS_DIR
              value: /usr/src/paperless/data/deadline-results
            - name: INFERENCE_TIMEOUT_SECONDS
              value: "90"
            - name: DEADLINE_POST_CONSUME_ASYNC
              value: "true"
            - name: PAPERLESS_URL
              value: http://129.114.27.190
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: hooks
              mountPath: /usr/src/paperless/scripts
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data-pvc
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media-pvc
        - name: hooks
          configMap:
            name: paperless-hooks
            defaultMode: 0755
