apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-monitor
  namespace: ml
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: drift-monitor
              image: ghcr.io/bhanuu01/datanauts-data-monitoring:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "drift_monitor.py"]
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"
              volumeMounts:
                - name: monitoring-data
                  mountPath: /data
          volumes:
            - name: monitoring-data
              persistentVolumeClaim:
                claimName: model-storage-pvc
