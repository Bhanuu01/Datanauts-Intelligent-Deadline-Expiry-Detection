apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-features
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-features
  template:
    metadata:
      labels:
        app: online-features
    spec:
      containers:
        - name: online-features
          image: ghcr.io/bhanuu01/datanauts-online-features:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: redis.paperless.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: PRODUCTION_DATA_LOG_PATH
              value: /data/production_ingest.jsonl
            - name: FEEDBACK_LOG_PATH
              value: /data/feedback_events.jsonl
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: feedback-storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: feedback-storage
          persistentVolumeClaim:
            claimName: model-storage-pvc
