apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-features
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-features
  template:
    metadata:
      labels:
        app: online-features
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        datanauts.io/durable-node: "true"
      containers:
        - name: online-features
          image: ghcr.io/bhanuu01/datanauts-online-features:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: redis.paperless.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: PRODUCTION_DATA_LOG_PATH
              value: /tmp/production_ingest.jsonl
            - name: FEEDBACK_LOG_PATH
              value: /tmp/feedback_events.jsonl
            - name: OBJECT_STORE_ENDPOINT_URL
              value: http://minio.platform.svc.cluster.local:9000
            - name: RUNTIME_LOG_BUCKET
              value: datanauts-runtime
            - name: PRODUCTION_DATA_S3_PREFIX
              value: runtime/online-features/ingest
            - name: FEEDBACK_S3_PREFIX
              value: runtime/online-features/feedback
            - name: AWS_ACCESS_KEY_ID
              value: mlflow
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
