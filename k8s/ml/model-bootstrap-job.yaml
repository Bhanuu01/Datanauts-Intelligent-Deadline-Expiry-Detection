apiVersion: batch/v1
kind: Job
metadata:
  name: model-bootstrap
  namespace: ml
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: model-bootstrap
          image: ghcr.io/bhanuu01/datanauts-platform-automation:latest
          imagePullPolicy: Always
          command: ["python", "/app/components/platform_automation/run_retrain_cycle.py"]
          env:
            - name: FORCE_RETRAIN
              value: "true"
            - name: PUBLISH_CANONICAL_MODEL
              value: "true"
            - name: NER_MODEL_NAME
              value: bert_ner_v1
            - name: CLASSIFIER_MODEL_NAME
              value: roberta_clf_v1
            - name: BOOTSTRAP_PRETRAINED_ONLY
              value: "true"
            - name: TRAIN_EPOCH_OVERRIDE
              value: "1"
            - name: BOOTSTRAP_MAX_TRAIN_SAMPLES
              value: "512"
            - name: BOOTSTRAP_MAX_VAL_SAMPLES
              value: "128"
            - name: BOOTSTRAP_MAX_TEST_SAMPLES
              value: "128"
            - name: FEEDBACK_METRICS_PATH
              value: /data/feedback_metrics.json
            - name: RETRAIN_DECISION_PATH
              value: /data/retrain_decision.json
            - name: EVALUATION_METRICS_PATH
              value: /data/evaluation_metrics.json
            - name: MODEL_RELEASES_ROOT
              value: /data/model-releases
            - name: MODEL_CANONICAL_ROOT
              value: /data
            - name: FEEDBACK_CHECKPOINT_PATH
              value: /data/feedback_checkpoint.json
            - name: PAPERLESS_API_URL
              value: http://paperless-ngx.paperless.svc.cluster.local:8000
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_ADMIN_USER
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_ADMIN_PASSWORD
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.platform.svc.cluster.local:5000
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio.platform.svc.cluster.local:9000
            - name: CROSS_DOMAIN_SAMPLES_PATH
              value: /app/components/training/samples/cross_domain_sample.json
            - name: AWS_ACCESS_KEY_ID
              value: mlflow
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "1000m"
              memory: "6Gi"
            limits:
              cpu: "4000m"
              memory: "12Gi"
          volumeMounts:
            - name: bootstrap-data
              mountPath: /data
            - name: bootstrap-data
              mountPath: /app/data
      volumes:
        - name: bootstrap-data
          persistentVolumeClaim:
            claimName: model-storage-pvc
