apiVersion: batch/v1
kind: CronJob
metadata:
  name: retrain-pipeline
  namespace: ml
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            datanauts.io/durable-node: "true"
          restartPolicy: OnFailure
          containers:
            - name: retrain-pipeline
              image: ghcr.io/bhanuu01/datanauts-platform-automation:latest
              imagePullPolicy: Always
              env:
                - name: FEEDBACK_METRICS_PATH
                  value: /tmp/feedback_metrics.json
                - name: RETRAIN_DECISION_PATH
                  value: /tmp/retrain_decision.json
                - name: EVALUATION_METRICS_PATH
                  value: /tmp/evaluation_metrics.json
                - name: MODEL_RELEASES_ROOT
                  value: /tmp/model-releases
                - name: MIN_FEEDBACK_EVENTS
                  value: "500"
                - name: MAX_CORRECTION_RATE
                  value: "0.15"
                - name: MIN_WRONG_FEEDBACK_SELECTIONS
                  value: "50"
                - name: NER_MODEL_NAME
                  value: bert_ner_v4
                - name: CLASSIFIER_MODEL_NAME
                  value: roberta_clf_v3
                - name: MODEL_CANDIDATE_PAIRS
                  value: bert_ner_v4:roberta_clf_v3,contracts_bert_ner_v1:deberta_clf_v1,legal_bert_ner_v1:deberta_clf_v1
                - name: ENABLE_RAY_TUNE_FOR_RETRAIN
                  value: "false"
                - name: FEEDBACK_CHECKPOINT_PATH
                  value: /tmp/feedback_checkpoint.json
                - name: CURRENT_PRODUCTION_METRICS_PATH
                  value: /tmp/current_production_metrics.json
                - name: PAPERLESS_API_URL
                  value: http://paperless-ngx.paperless.svc.cluster.local:8000
                - name: PAPERLESS_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: paperless-secrets
                      key: PAPERLESS_ADMIN_USER
                - name: PAPERLESS_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: paperless-secrets
                      key: PAPERLESS_ADMIN_PASSWORD
                - name: MLFLOW_TRACKING_URI
                  value: http://mlflow.platform.svc.cluster.local:5000
                - name: MLFLOW_S3_ENDPOINT_URL
                  value: http://minio.platform.svc.cluster.local:9000
                - name: OBJECT_STORE_ENDPOINT_URL
                  value: http://minio.platform.svc.cluster.local:9000
                - name: RUNTIME_LOG_BUCKET
                  value: datanauts-runtime
                - name: MODEL_ARTIFACT_BUCKET
                  value: datanauts-models
                - name: FEEDBACK_S3_PREFIX
                  value: runtime/online-features/feedback
                - name: EVALUATION_METRICS_S3_KEY
                  value: automation/evaluation_metrics.json
                - name: RETRAIN_DECISION_S3_KEY
                  value: automation/retrain_decision.json
                - name: FEEDBACK_CHECKPOINT_S3_KEY
                  value: automation/feedback_checkpoint.json
                - name: CURRENT_PRODUCTION_METRICS_S3_KEY
                  value: automation/current_production_metrics.json
                - name: MIN_CANDIDATE_SCORE
                  value: "0.45"
                - name: MAX_SCORE_REGRESSION
                  value: "0.01"
                - name: MAX_NER_F1_REGRESSION
                  value: "0.02"
                - name: MAX_CLF_F1_REGRESSION
                  value: "0.02"
                - name: MAX_E2E_COVERAGE_REGRESSION
                  value: "0.02"
                - name: CROSS_DOMAIN_SAMPLES_PATH
                  value: /app/components/training/samples/cross_domain_sample.json
                - name: AWS_ACCESS_KEY_ID
                  value: mlflow
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: MINIO_ROOT_PASSWORD
              resources:
                requests:
                  cpu: "2000m"
                  memory: "8Gi"
                limits:
                  cpu: "4000m"
                  memory: "16Gi"
