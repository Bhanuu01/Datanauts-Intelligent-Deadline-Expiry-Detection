apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadline-inference
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deadline-inference
  template:
    metadata:
      labels:
        app: deadline-inference
    spec:
      containers:
        - name: deadline-inference
          image: ghcr.io/bhanuu01/datanauts-inference-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: CLF_MODEL_PATH
              value: /models/classifier
            - name: NER_MODEL_PATH
              value: /models/ner
            - name: CONFIDENCE_THRESHOLD
              value: "0.7"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: model-storage
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 40
            periodSeconds: 30
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-storage-pvc
