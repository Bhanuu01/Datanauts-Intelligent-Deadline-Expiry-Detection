apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-promotion-gate
  namespace: ml
spec:
  schedule: "15 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            datanauts.io/storage-node: "true"
          restartPolicy: OnFailure
          containers:
            - name: model-promotion-gate
              image: ghcr.io/bhanuu01/datanauts-platform-automation:latest
              imagePullPolicy: Always
              imagePullPolicy: Always
              command: ["python", "/app/components/platform_automation/evaluate_and_promote.py"]
              env:
                - name: EVALUATION_METRICS_PATH
                  value: /tmp/evaluation_metrics.json
                - name: SERVING_METRICS_PATH
                  value: /tmp/serving_metrics.json
                - name: PROMOTION_DECISION_PATH
                  value: /tmp/promotion_decision.json
                - name: OBJECT_STORE_ENDPOINT_URL
                  value: http://minio.platform.svc.cluster.local:9000
                - name: RUNTIME_LOG_BUCKET
                  value: datanauts-runtime
                - name: EVALUATION_METRICS_S3_KEY
                  value: automation/evaluation_metrics.json
                - name: SERVING_METRICS_S3_KEY
                  value: automation/serving_metrics.json
                - name: PROMOTION_DECISION_S3_KEY
                  value: automation/promotion_decision.json
                - name: AWS_ACCESS_KEY_ID
                  value: mlflow
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: MINIO_ROOT_PASSWORD
                - name: MIN_NER_F1
                  value: "0.64"
                - name: MIN_CLF_MACRO_F1
                  value: "0.60"
                - name: MIN_E2E_COVERAGE
                  value: "0.60"
                - name: MAX_FALSE_ALARM_COUNT
                  value: "10"
                - name: MAX_LATENCY_P95_MS
                  value: "500"
                - name: MAX_LIVE_ERROR_RATE
                  value: "0.05"
                - name: MAX_LIVE_LATENCY_P95_MS
                  value: "500"
                - name: MAX_LIVE_CORRECTION_RATE_7D
                  value: "0.15"
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"
