apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:latest
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "3Gi"
          ports:
            - containerPort: 5000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MLFLOW_BACKEND_STORE_URI
              value: "postgresql://mlflow:$(POSTGRES_PASSWORD)@mlflow-postgres:5432/mlflow"
            - name: MLFLOW_DEFAULT_ARTIFACT_ROOT
              value: "s3://mlflow/"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.platform.svc.cluster.local:9000"
            - name: AWS_ACCESS_KEY_ID
              value: mlflow
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - >
              mlflow server
              --host=0.0.0.0
              --port=5000
              --backend-store-uri=postgresql://mlflow:${POSTGRES_PASSWORD}@mlflow-postgres:5432/mlflow
              --default-artifact-root=s3://mlflow/
              --static-prefix=/mlflow
              --allowed-hosts=*
              --cors-allowed-origins=*
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-pvc
