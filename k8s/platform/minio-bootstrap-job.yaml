apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  namespace: platform
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              value: mlflow
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              until /usr/bin/mc alias set local http://minio.platform.svc.cluster.local:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                echo "Waiting for MinIO..."
                sleep 5
              done
              /usr/bin/mc mb --ignore-existing local/mlflow
              /usr/bin/mc mb --ignore-existing local/datanauts-runtime
              /usr/bin/mc anonymous set none local/mlflow || true
              /usr/bin/mc anonymous set none local/datanauts-runtime || true
