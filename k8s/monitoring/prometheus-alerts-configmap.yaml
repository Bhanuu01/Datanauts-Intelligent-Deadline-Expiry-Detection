apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: datanauts-platform
        rules:
          - alert: LiveDeadlineServingDown
            expr: kube_deployment_status_replicas_available{namespace="ml", deployment="deadline-onnx-serving"} < 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Live deadline serving service is down
              description: The ONNX live deadline serving deployment in the ml namespace has had no available replicas for 2 minutes.

          - alert: OnlineFeaturesDown
            expr: kube_deployment_status_replicas_available{namespace="ml", deployment="online-features"} < 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Online features service is down
              description: The online feature deployment in the ml namespace has had no available replicas for 2 minutes.

          - alert: MLNamespacePodsNotRunning
            expr: sum by (namespace) (kube_pod_status_phase{namespace="ml", phase=~"Pending|Failed|Unknown"}) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Pods in the ml namespace are not healthy
              description: One or more pods in the ml namespace have stayed in a non-running phase for over 5 minutes.

          - alert: OnnxServingLowConfidence
            expr: histogram_quantile(0.95, sum by (le) (rate(deadline_onnx_confidence_score_bucket{job="kubernetes-pods",app=~"deadline-onnx-serving.*"}[5m]))) < 0.55
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: ONNX serving confidence has degraded
              description: The p95 observed ONNX confidence score has stayed below 0.55 for 10 minutes.

          - alert: OnnxServingUncertainSpike
            expr: increase(deadline_onnx_uncertain_predictions_total{job="kubernetes-pods",app=~"deadline-onnx-serving.*"}[15m]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: ONNX serving uncertain predictions spiked
              description: The ONNX live serving path produced more than 5 uncertain predictions in the last 15 minutes.

          - alert: OnnxServingLatencyHigh
            expr: histogram_quantile(0.95, sum by (le) (rate(deadline_onnx_inference_latency_seconds_bucket{job="kubernetes-pods",app=~"deadline-onnx-serving.*"}[5m]))) > 0.5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: ONNX serving latency is elevated
              description: The ONNX live serving path has sustained p95 inference latency above 500ms for 10 minutes.

          - alert: OnlineFeaturesRedisErrors
            expr: increase(online_features_redis_errors_total{job="kubernetes-pods",app="online-features"}[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Online features encountered Redis errors
              description: The online features service has emitted Redis write/read errors in the last 15 minutes.

          - alert: PlatformServicesDown
            expr: |
              min(kube_deployment_status_replicas_available{namespace="platform", deployment=~"mlflow|minio"}) < 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Shared platform service is down
              description: MLflow or MinIO has had no available replicas for at least 2 minutes.

          - alert: NodeDiskPressure
            expr: kube_node_status_condition{condition="DiskPressure", status="true"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Kubernetes node is under disk pressure
              description: The Chameleon Kubernetes node has entered DiskPressure and may evict workloads.

          - alert: PodsStuckImagePull
            expr: kube_pod_container_status_waiting_reason{namespace=~"ml|paperless|platform|monitoring", pod=~"online-features.*|deadline-onnx-serving.*|paperless-ngx.*|mlflow.*|minio.*|grafana.*|prometheus.*", reason=~"ImagePullBackOff|ErrImagePull|ErrImageNeverPull"} > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Pod is stuck pulling an image
              description: One or more core long-lived workload pods are stuck in image pull backoff for over 5 minutes.

          - alert: CoreWorkloadUnavailable
            expr: sum(kube_deployment_status_replicas_unavailable{namespace=~"paperless|platform|monitoring|ml", deployment=~"paperless-ngx|mlflow|minio|grafana|prometheus|online-features|deadline-onnx-serving"}) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: A core workload has unavailable replicas
              description: One or more core Paperless, platform, monitoring, or ML deployments have unavailable replicas for at least 5 minutes.

          - alert: PodRestartsHigh
            expr: |
              (
                sum by (namespace, pod) (
                  increase(
                    kube_pod_container_status_restarts_total{
                      namespace=~"paperless|platform|monitoring|ml",
                      pod=~"paperless-ngx.*|postgres.*|redis.*|mlflow.*|mlflow-postgres.*|minio.*|grafana.*|prometheus.*|kube-state-metrics.*|online-features.*|data-generator.*|deadline-onnx-serving.*|deadline-onnx-serving-canary.*|deadline-onnx-serving-production.*|deadline-onnx-serving-staging.*"
                    }[15m]
                  )
                )
              )
              * on(namespace, pod) group_left()
              max by (namespace, pod) (kube_pod_status_phase{phase="Running"})
              > 2
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Pod restart count is elevated
              description: A workload pod has restarted more than twice in 15 minutes, which may indicate instability.

          - alert: SharedPlatformMemoryHigh
            expr: |
              (
                container_memory_working_set_bytes{namespace="platform", pod=~"mlflow.*|minio.*", container!="", image!=""}
                /
                on(namespace, pod, container) kube_pod_container_resource_limits{namespace="platform", resource="memory", unit="byte"}
              ) > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Shared platform service memory utilization is high
              description: MLflow or MinIO has used more than 85% of its configured memory limit for 10 minutes.

          - alert: MonitoringMemoryHigh
            expr: |
              (
                container_memory_working_set_bytes{namespace="monitoring", pod=~"grafana.*|prometheus.*", container!="", image!=""}
                /
                on(namespace, pod, container) kube_pod_container_resource_limits{namespace="monitoring", resource="memory", unit="byte"}
              ) > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Monitoring component memory utilization is high
              description: Grafana or Prometheus has used more than 85% of its configured memory limit for 10 minutes.

          - alert: NodeMemoryPressure
            expr: kube_node_status_condition{condition="MemoryPressure", status="true"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Kubernetes node is under memory pressure
              description: The Chameleon Kubernetes node has entered MemoryPressure and workloads may degrade or be evicted.
