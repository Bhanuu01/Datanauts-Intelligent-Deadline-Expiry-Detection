apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: datanauts-platform
        rules:
          - alert: DeadlineInferenceDown
            expr: up{job="kubernetes-services", kubernetes_namespace="ml", kubernetes_service_name="deadline-inference"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Deadline inference service is down
              description: The deadline inference service in the ml namespace has not been scrapeable for 2 minutes.

          - alert: OnlineFeaturesDown
            expr: up{job="kubernetes-services", kubernetes_namespace="ml", kubernetes_service_name="online-features"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Online features service is down
              description: The online feature service in the ml namespace has not been scrapeable for 2 minutes.

          - alert: MLNamespacePodsNotRunning
            expr: sum by (namespace) (kube_pod_status_phase{namespace="ml", phase=~"Pending|Failed|Unknown"}) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Pods in the ml namespace are not healthy
              description: One or more pods in the ml namespace have stayed in a non-running phase for over 5 minutes.

          - alert: InferenceHighLatencyP95
            expr: histogram_quantile(0.95, sum by (le) (rate(deadline_inference_latency_seconds_bucket[5m]))) > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Deadline inference p95 latency is high
              description: The p95 latency for the deadline inference service has exceeded 1 second for 10 minutes.

          - alert: InferenceFailuresDetected
            expr: increase(deadline_inference_failures_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Deadline inference failures detected
              description: The deadline inference service has raised one or more inference failures in the last 15 minutes.
