            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(deadline_onnx_predictions_total[5m])) or vector(0)",
              "legendFormat": "onnx predictions",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum(rate(online_features_ingest_requests_total[5m])) or vector(0)",
