          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(increase(deadline_onnx_uncertain_predictions_total[15m])) or vector(0)",
              "legendFormat": "onnx uncertain (15m)",
              "range": true,
              "refId": "A"
