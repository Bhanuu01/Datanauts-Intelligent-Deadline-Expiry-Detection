apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadline-onnx-serving-production
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deadline-onnx-serving-production
      release_channel: production
  template:
    metadata:
      labels:
        app: deadline-onnx-serving-production
        release_channel: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        datanauts.io/durable-node: "true"
      containers:
        - name: deadline-onnx-serving-production
          image: ghcr.io/bhanuu01/datanauts-onnx-serving:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          env:
            - name: ONNX_MODEL_PATH
              value: /models/onnx_quantized_model
            - name: ONNX_CLF_MODEL_PATH
              value: /models/onnx_quantized_model/onnx_quantized_clf
            - name: ONNX_NER_MODEL_PATH
              value: /models/onnx_quantized_model/onnx_quantized_ner
            - name: ONNX_CONFIDENCE_THRESHOLD
              value: "0.7"
            - name: ONNX_MAX_SENTENCES
              value: "40"
            - name: ONNX_MAX_SENTENCE_CHARS
              value: "512"
            - name: FEEDBACK_LOG_PATH
              value: /tmp/serving_feedback_production.jsonl
            - name: RELEASE_CHANNEL
              value: production
            - name: OBJECT_STORE_ENDPOINT_URL
              value: http://minio.platform.svc.cluster.local:9000
            - name: MODEL_BUNDLE_S3_KEY
              value: releases/bootstrap/bundle.tar.gz
            - name: MODEL_ARTIFACT_BUCKET
              value: datanauts-models
            - name: MODEL_LOCAL_CACHE_ROOT
              value: /tmp/model-cache
            - name: RUNTIME_LOG_BUCKET
              value: datanauts-runtime
            - name: SERVING_FEEDBACK_S3_PREFIX
              value: runtime/serving/feedback
            - name: AWS_ACCESS_KEY_ID
              value: mlflow
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
