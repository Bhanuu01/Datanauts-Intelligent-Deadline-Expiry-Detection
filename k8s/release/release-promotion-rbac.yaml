apiVersion: v1
kind: ServiceAccount
metadata:
  name: release-promotion
  namespace: ml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: release-promotion
  namespace: ml
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-promotion
  namespace: ml
subjects:
  - kind: ServiceAccount
    name: release-promotion
    namespace: ml
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: release-promotion
