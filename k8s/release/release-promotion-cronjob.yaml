apiVersion: batch/v1
kind: CronJob
metadata:
  name: release-promotion
  namespace: ml
spec:
  schedule: "20 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: release-promotion
          restartPolicy: OnFailure
          containers:
            - name: release-promotion
              image: ghcr.io/bhanuu01/datanauts-platform-automation:latest
              imagePullPolicy: Never
              command: ["python", "/app/components/platform_automation/promote_release.py"]
              env:
                - name: CURRENT_RELEASE_STAGE
                  value: canary
                - name: PROMOTION_DECISION_PATH
                  value: /data/promotion_decision.json
                - name: RELEASE_PLAN_PATH
                  value: /data/release_plan.json
                - name: RELEASE_STATE_PATH
                  value: /data/release_state.json
                - name: MODEL_RELEASES_ROOT
                  value: /data/model-releases
                - name: MODEL_CANONICAL_ROOT
                  value: /data
                - name: AUTO_APPLY_RELEASE
                  value: "true"
                - name: LIVE_SERVICE_NAME
                  value: deadline-onnx-serving
                - name: K8S_NAMESPACE
                  value: ml
              volumeMounts:
                - name: release-data
                  mountPath: /data
          volumes:
            - name: release-data
              persistentVolumeClaim:
                claimName: model-storage-pvc
