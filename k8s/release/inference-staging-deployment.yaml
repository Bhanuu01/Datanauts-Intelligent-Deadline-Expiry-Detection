apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadline-onnx-serving-staging
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deadline-onnx-serving-staging
      release_channel: staging
  template:
    metadata:
      labels:
        app: deadline-onnx-serving-staging
        release_channel: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: deadline-onnx-serving-staging
          image: ghcr.io/bhanuu01/datanauts-onnx-serving:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          env:
            - name: ONNX_MODEL_PATH
              value: /models/onnx_quantized_model
            - name: ONNX_CLF_MODEL_PATH
              value: /models/onnx_quantized_model/onnx_quantized_clf
            - name: ONNX_NER_MODEL_PATH
              value: /models/onnx_quantized_model/onnx_quantized_ner
            - name: ONNX_CONFIDENCE_THRESHOLD
              value: "0.7"
            - name: FEEDBACK_LOG_PATH
              value: /models/serving_feedback_staging.jsonl
            - name: RELEASE_CHANNEL
              value: staging
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: model-storage
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-storage-pvc
