apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-data-pv
  labels:
    datanauts.io/storage-tier: durable-block
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: datanauts-durable
  volumeMode: Filesystem
  claimRef:
    namespace: paperless
    name: paperless-data-pvc
  local:
    path: /srv/datanauts-volumes/paperless/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - __CONTROL_PLANE_NODE_NAME__
---
