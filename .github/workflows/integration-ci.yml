name: Integration CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_bootstrap:
        description: "Recreate and wait for the model-bootstrap job during deploy"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            components/inference_service/app.py \
            components/platform_automation/run_retrain_cycle.py \
            components/platform_automation/evaluate_and_promote.py \
            components/platform_automation/promote_release.py \
            components/serving/app_onnx_quant.py \
            components/serving/quantize_onnx.py \
            components/serving/deployment_trigger.py \
            components/training/src/build_dataset.py \
            components/training/src/evaluate.py \
            components/training/src/predict.py \
            components/training/src/train_classifier.py \
            components/training/src/train_ner.py

      - name: Validate shell scripts
        run: |
          bash -n \
            scripts/create-secrets.sh \
            scripts/deploy-existing-cluster.sh \
            scripts/fetch-kubeconfig.sh \
            scripts/generate-ansible-inventory.sh \
            scripts/infra-destroy.sh \
            scripts/infra-up.sh \
            scripts/publish-bootstrap-artifacts.sh \
            scripts/sync-public-endpoints.sh \
            scripts/sync-runtime-secrets.sh

      - name: Validate Ansible playbooks
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/ansible-local \
          ANSIBLE_REMOTE_TEMP=/tmp/ansible-remote \
          ansible-playbook -i localhost, infra/ansible/playbooks/deploy-platform-stack.yml --syntax-check
          ANSIBLE_LOCAL_TEMP=/tmp/ansible-local \
          ANSIBLE_REMOTE_TEMP=/tmp/ansible-remote \
          ansible-playbook -i infra/ansible/inventory/inventory.ini.example infra/ansible/playbooks/bootstrap-k3s.yml --syntax-check || true

      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform/openstack fmt -check

      - name: Verify manifest entry points
        run: |
          test -f k8s/durable-pvs.yaml
          test -f k8s/ml/kustomization.yaml
          test -f k8s/release/kustomization.yaml
          test -f k8s/monitoring/kustomization.yaml
          test -f k8s/platform/minio-deployment.yaml
          test -f k8s/paperless/paperless-deployment.yaml

      - name: Render kustomize overlays
        run: |
          kubectl kustomize k8s/ml >/tmp/ml.yaml
          kubectl kustomize k8s/release >/tmp/release.yaml
          kubectl kustomize k8s/monitoring >/tmp/monitoring.yaml

  build-images:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: datanauts-online-features
            dockerfile: components/data/online_features/Dockerfile
            context: .
          - image: datanauts-data-generator
            dockerfile: components/data/data_generator/Dockerfile
            context: components/data/data_generator
          - image: datanauts-data-monitoring
            dockerfile: components/data/evaluation_monitoring/Dockerfile
            context: components/data/evaluation_monitoring
          - image: datanauts-platform-automation
            dockerfile: components/platform_automation/Dockerfile
            context: .
          - image: datanauts-inference-runtime
            dockerfile: components/inference_service/Dockerfile.runtime
            context: .
          - image: datanauts-onnx-serving
            dockerfile: components/serving/Dockerfile.onnx_quant
            context: .
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve registry settings
        env:
          GHCR_USERNAME_SECRET: ${{ secrets.GHCR_USERNAME }}
          IMAGE_REGISTRY_OWNER_SECRET: ${{ secrets.IMAGE_REGISTRY_OWNER }}
        run: |
          registry_owner="${IMAGE_REGISTRY_OWNER_SECRET:-${GHCR_USERNAME_SECRET:-${GITHUB_REPOSITORY_OWNER}}}"
          registry_owner="${registry_owner,,}"
          login_user="${GHCR_USERNAME_SECRET:-${registry_owner}}"
          login_user="${login_user,,}"
          echo "REGISTRY_OWNER_LC=${registry_owner}" >> "$GITHUB_ENV"
          echo "GHCR_LOGIN_USER=${login_user}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        env:
          GHCR_TOKEN_SECRET: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN_SECRET: ${{ secrets.GITHUB_TOKEN }}
        run: |
          login_token="${GHCR_TOKEN_SECRET:-${GITHUB_TOKEN_SECRET}}"
          echo "${login_token}" | docker login ghcr.io -u "${GHCR_LOGIN_USER}" --password-stdin

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.REGISTRY_OWNER_LC }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lifecycle-dry-run:
    needs: validate
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install automation requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r components/platform_automation/requirements.txt

      - name: Create dry-run lifecycle inputs
        run: |
          mkdir -p /tmp/lifecycle-data
          printf '{"ner_f1":0.81,"clf_macro_f1":0.84,"e2e_coverage":0.72,"false_alarm_count":2,"candidate_latency_p95_ms":120,"candidate_version":"candidate-001","candidate_bundle_s3_key":"releases/candidate-001/bundle.tar.gz","registration_eligible":true,"training_quality_gate":{"eligible":true,"failed_gates":[]},"model_registry":{"ner":{"registered_model":"deadline-ner","version":"2"},"classifier":{"registered_model":"deadline-classifier","version":"2"}}}' > /tmp/lifecycle-data/evaluation_metrics.json
          printf '{"live_error_rate":0.01,"live_latency_p95_ms":180,"live_correction_rate_7d":0.02}' > /tmp/lifecycle-data/serving_metrics.json
          printf '{"current_version":"bootstrap","previous_version":null,"current_stage":"staging","current_bundle_s3_key":"releases/bootstrap/bundle.tar.gz","current_model_registry":{}}' > /tmp/lifecycle-data/release_state.json

      - name: Evaluate promotion gate
        run: |
          EVALUATION_METRICS_PATH=/tmp/lifecycle-data/evaluation_metrics.json \
          SERVING_METRICS_PATH=/tmp/lifecycle-data/serving_metrics.json \
          PROMOTION_DECISION_PATH=/tmp/lifecycle-data/promotion_decision.json \
          python components/platform_automation/evaluate_and_promote.py

      - name: Apply dry-run promotion
        run: |
          PROMOTION_DECISION_PATH=/tmp/lifecycle-data/promotion_decision.json \
          RELEASE_PLAN_PATH=/tmp/lifecycle-data/release_plan.json \
          RELEASE_STATE_PATH=/tmp/lifecycle-data/release_state.json \
          AUTO_APPLY_RELEASE=true \
          SKIP_K8S_APPLY=true \
          SKIP_MODEL_ALIAS_UPDATES=true \
          python components/platform_automation/promote_release.py

      - name: Assert packaged deployment result
        run: |
          test -f /tmp/lifecycle-data/release_plan.json
          test -f /tmp/lifecycle-data/release_state.json
          python - <<'PY'
          import json
          from pathlib import Path
          release_plan = json.loads(Path('/tmp/lifecycle-data/release_plan.json').read_text())
          release_state = json.loads(Path('/tmp/lifecycle-data/release_state.json').read_text())
          assert release_plan['action'] == 'promote'
          assert release_plan['applied'] is True
          assert release_state['current_version'] == 'candidate-001'
          assert release_state['current_bundle_s3_key'] == 'releases/candidate-001/bundle.tar.gz'
          assert release_state['current_stage'] == 'canary'
          PY

  deploy-chameleon:
    needs:
      - build-images
      - lifecycle-dry-run
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      PUBLIC_HOST: ${{ secrets.DEPLOY_PUBLIC_HOST }}
      CONTROL_PLANE_PUBLIC_IP: ${{ secrets.DEPLOY_PUBLIC_HOST }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      IMAGE_REGISTRY_OWNER: ${{ secrets.IMAGE_REGISTRY_OWNER }}
      RUN_BOOTSTRAP_JOB: ${{ github.event_name == 'workflow_dispatch' && inputs.run_bootstrap || false }}
      USE_EXISTING_SOURCE_SECRETS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Check deploy secrets
        run: |
          if [[ -z "${{ secrets.KUBECONFIG_B64 }}" || -z "${{ secrets.DEPLOY_PUBLIC_HOST }}" ]]; then
            echo "KUBECONFIG_B64 and/or DEPLOY_PUBLIC_HOST are not configured; skipping deploy."
            exit 0
          fi

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Detect durable node
        run: |
          echo "CONTROL_PLANE_NODE_NAME=$(kubectl get nodes -l datanauts.io/durable-node=true -o jsonpath='{.items[0].metadata.name}')" >> "$GITHUB_ENV"

      - name: Deploy full stack to existing cluster
        run: bash scripts/deploy-existing-cluster.sh
