apiVersion: batch/v1
kind: Job
metadata:
  name: deadline-ray-tune
  namespace: datanauts
  labels:
    app: deadline-ray-tune
    team: datanauts
    role: training
spec:
  template:
    metadata:
      labels:
        app: deadline-ray-tune
    spec:
      restartPolicy: Never
      containers:
        - name: deadline-ray
          image: deadline-ray:latest
          command: ["python", "src/train_ner_ray_tune.py"]
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-service:5000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio-service:9000"
            - name: RAY_DEDUP_LOGS
              value: "0"
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "64Gi"
              cpu: "16"
            requests:
              nvidia.com/gpu: 1
              memory: "32Gi"
              cpu: "8"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: ray-results
              mountPath: /tmp/ray_results
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "10Gi"
        - name: ray-results
          emptyDir: {}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
  backoffLimit: 1
---
# To run classifier Ray Tune instead, change command to:
# ["python", "src/train_classifier_ray_tune.py"]
# Runs 8 ASHA trials, 2 concurrent, 0.5 GPU each
