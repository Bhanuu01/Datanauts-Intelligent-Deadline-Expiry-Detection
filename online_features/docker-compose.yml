version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD','redis-cli','ping']
      interval: 5s
      retries: 5
  feature-service:
    build: .
    ports:
      - '8000:8000'
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
