version: '3.8'
services:
  ingestion-check:
    build: .
    command: python3 ingestion_quality_check.py
    volumes:
      - ./data:/data
      - ./eval_output:/app/eval_output

  training-quality-check:
    build: .
    command: python3 training_set_quality_check.py
    volumes:
      - ./data:/data
      - ./eval_output:/app/eval_output

  drift-monitor:
    build: .
    command: python3 drift_monitor.py
    volumes:
      - ./data:/data
      - ./eval_output:/app/eval_output
